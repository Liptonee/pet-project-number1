spring.application.name=taskManager

# spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true


spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:postgres}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:root}



spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:xq9hN0hOSGidtbfFNfAa7biC42KAvI20k17C4MW2JT2}


# Красивые цвета
spring.output.ansi.enabled=ALWAYS

# Человеческий формат
logging.pattern.console=%clr(%d{HH:mm:ss.SSS}){cyan} %clr(%-5level){} %clr([%thread]){magenta} %clr(%logger{36}){yellow} - %msg%n
logging.pattern.dateformat=HH:mm:ss.SSS

# Уровень для всего приложения
logging.level.root=INFO

# Для ваших пакетов можно поставить DEBUG во время разработки
logging.level.taskManager=DEBUG

# Для Spring – можно уменьшить детализацию
logging.level.org.springframework.web=WARN


spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.database=0
# log for Redis
logging.level.org.springframework.data.redis.core=DEBUG

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.acks=all
spring.kafka.producer.properties.retries=3
spring.kafka.producer.properties.enable.idempotence=true